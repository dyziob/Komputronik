<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komputronik Sklep Internetowy - Rejestracja</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="../static/css/style.css">
</head>
<body>
<!-- Nawigacja -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <a class="navbar-brand" th:href="@{/}">Komputronik</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
            <li class="nav-item">
                <a class="nav-link" href="#">Produkty</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" href="#">Kontakt</a>
            </li>
            <li class="nav-item">
                <a class="nav-link" th:href="@{/login}">Zaloguj się</a>
            </li>
        </ul>
    </div>
</nav>

<!-- Treść strony -->
<div class="container mt-4">
        <div class="row">
            <div class="col-md-6 offset-md-3">
                    <div th:if="${param.success}">
                        <div class="alert alert-info">Udało Ci się zarejestrować!</div>
                    </div>
                <h2>Rejestracja</h2>
                <form th:action="@{/register/save}" method="post" th:object="${user}">
                    <div class="form-group">
                        <label for="firstName">Imię</label>
                        <input type="text" class="form-control" th:field="*{firstName}" required id="firstName" placeholder="Wprowadź imię" >
                        <p th:errors="*{firstName}" class="text-danger"
                           th:if="${#fields.hasErrors('firstName')}">
                        </p>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Nazwisko</label>
                        <input type="text" class="form-control" th:field="*{lastName}" required id="lastName" placeholder="Wprowadź nazwisko">
                        <p th:errors="*{lastName}" class="text-danger"
                           th:if="${#fields.hasErrors('lastName')}">
                        </p>
                    </div>
                    <div class="form-group">
                        <label for="email">Adres email</label>
                        <input type="email" class="form-control" th:field="*{email}" required id="email" placeholder="Wprowadź adres email">
                        <p th:errors="*{email}" class="text-danger"
                           th:if="${#fields.hasErrors('email')}">
                        </p>
                    </div>
                    <div class="form-group">
                        <label for="password">Hasło</label>
                        <input type="password" class="form-control" th:field="*{password}" required id="password" placeholder="Wprowadź hasło">
                        <p th:errors="*{password}" class="text-danger"
                           th:if="${#fields.hasErrors('password')}">
                        </p>
                    </div>
                    <button type="submit" class="btn btn-primary">Zarejestruj się</button>
                    <span>Już zarejestrowany? <a hres="/" th:href="@{/login}"> Zaloguj się tutaj! </a></span>
                </form>
            </div>
        </div>
    </div>


<!-- Stopka -->
<footer class="bg-dark text-white text-center p-3 fixed-bottom">
    &copy; 2023 Komputronik Sklep Internetowy
</footer>

<!-- Skrypty Bootstrap (jQuery i Popper.js) -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
</body>
</html>
